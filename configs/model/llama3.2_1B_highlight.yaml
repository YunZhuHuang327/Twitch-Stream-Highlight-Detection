# @package _global_

defaults:
  - llama3.2_1B

# 模型名称
model_name: Llama-3.2-1B-Instruct-Highlight

# Task 配置
task_type: highlight_detection
output_format: segment  # 输出时间段而非单点

# Training 配置 - 针对 16GB GPU 优化
config_train:
  # 基础设置
  model_name: ${model_name}
  enable_fsdp: False
  run_validation: True
  batch_size_training: 1
  val_batch_size: 1
  num_epochs: 3
  
  # Context 长度 - 为 16GB GPU 优化
  context_length: 2048  # 减少以节省内存
  
  # LoRA 设置
  use_peft: True
  peft_method: lora
  r: 4  # LoRA rank - 为 16GB GPU 减小
  lora_alpha: 8
  lora_dropout: 0.05
  
  # 优化器
  optimizer: adamw
  lr: 5e-5  # 略低于 default，更稳定
  weight_decay: 0.01
  
  # 内存优化
  use_gradient_checkpointing: True
  gradient_accumulation_steps: 8  # 模拟更大的 batch size
  gradient_clipping: True
  gradient_clipping_threshold: 1.0
  
  # Mixed precision
  use_fp16: False
  use_bf16: True  # RTX A4000 supports BF16
  
  # Logging
  output_dir: outputs/highlight/${model_name}/${data.prompt}/${logger.project}/${data.train_subset}/${experiment}
  save_model: True
  save_optimizer: False  # 节省空间
  save_metrics: True
  flop_counter: False
  
  # Checkpointing
  use_fast_kernels: True
  batching_strategy: packing
