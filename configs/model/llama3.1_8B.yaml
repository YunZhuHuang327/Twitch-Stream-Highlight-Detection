model_name: Meta-Llama-3.1-8B-Instruct

trainer:
  _target_: src.models.llama_finetune.Trainer

config_train:
  enable_fsdp: False  # Disabled for Windows single GPU
  quantization: Null # None, 8bit, 4bit
  #model_name: ${paths.checkpoints_dir}/meta-llama/${model.model_name}/ # Use this if you want to use the model from the local directory
  #model_name: meta-llama/${model.model_name}
  model_name: D:/chapter-llama/Llama-3.2-1B-Instruct
  num_epochs: 1 
  run_validation: False 
  use_peft: True
  peft_method: lora
  r: 4 # lora rank - reduced from 8 to 4 to save memory
  save_model: True
  dist_checkpoint_root_folder: model_checkpoints 
  dist_checkpoint_folder: fine-tuned 
  fsdp_config.pure_bf16: True
  output_dir: ${paths.output_dir}/model_checkpoints/
  batching_strategy: padding 
  batch_size_training: 1 
  context_length: 2048  # Further reduced from 4096 to 2048 to fit in 16GB GPU
  gradient_accumulation_steps: 8  # Increased to compensate for smaller context
  gradient_clipping: True
  gradient_clipping_threshold: 1.0
  use_gradient_checkpointing: True  # Enable gradient checkpointing to save memory
  lr: 1e-4
  save_metrics: True 
  use_wandb: ${use_wandb}
  seed: ${seed}

config_inference:
  _target_: src.models.llama_inference.LlamaInference
  ckpt_path: ${model.config_train.model_name}
  quantization: ${model.config_train.quantization}
  use_fast_kernels: True
  peft_model: ${paths.output_dir}/model_checkpoints/

subset: ${data.subset}
model_flags: "default"